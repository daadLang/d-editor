<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; object-src 'none'">
  <title>ض IDE - Ḍād Programming Language</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-title">ض IDE</div>
      <div class="header-actions">
        <button id="toggleSidebarBtn" class="btn-header icon" title="إظهار/إخفاء المستكشف (Ctrl+B)" aria-pressed="true">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M1.5 2.5A1.5 1.5 0 0 1 3 1h10a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 13 15H3a1.5 1.5 0 0 1-1.5-1.5v-11zM3 2a.5.5 0 0 0-.5.5V4h11V2.5a.5.5 0 0 0-.5-.5H3zm-.5 3v8.5A.5.5 0 0 0 3 14h4.5V5H2.5zm6 0v9H13a.5.5 0 0 0 .5-.5V5h-5z"/>
          </svg>
        </button>
        <button id="runBtn" class="btn-header btn-run" title="تشغيل (F5)">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
      <!-- File Explorer -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-header-title">المستكشف</div>
          <div class="sidebar-header-actions">
            <button id="openFolderBtn" class="btn-header small" title="فتح مجلد">
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M.5 3l.04.87a1.99 1.99 0 0 0-.342 1.311l.637 7A2 2 0 0 0 2.826 14H9v-1H2.826a1 1 0 0 1-.995-.91l-.637-7A1 1 0 0 1 2.19 4h11.62a1 1 0 0 1 .996 1.09L14.54 8h1.005l.256-2.819A2 2 0 0 0 13.81 3H9.828a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 6.172 1H2.5a2 2 0 0 0-2 2zm5.672-1a1 1 0 0 1 .707.293L7.586 3H2.19c-.24 0-.47.042-.683.12L1.5 2.98a1 1 0 0 1 1-.98h3.672z"/>
                <path d="M13.5 10a.5.5 0 0 1 .5.5V12h1.5a.5.5 0 1 1 0 1H14v1.5a.5.5 0 1 1-1 0V13h-1.5a.5.5 0 0 1 0-1H13v-1.5a.5.5 0 0 1 .5-.5z"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="fileTree" class="file-tree">
          <div class="empty-state">افتح مجلدًا للبدء</div>
        </div>
      </aside>

      <!-- Editor -->
      <main class="editor-container">
        <div class="tabs-bar">
          <div id="tabs" class="tabs"></div>
          <div class="tabs-actions">
            <button id="openSettingsTabBtn" class="btn-tab-action" title="الإعدادات">
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M9.405 1.05c-.41-1.4-2.4-1.4-2.81 0l-.115.39a1.725 1.725 0 0 1-2.526 1.01l-.35-.2c-1.22-.7-2.7.78-2 2l.2.35a1.725 1.725 0 0 1-1.01 2.526l-.39.115c-1.4.41-1.4 2.4 0 2.81l.39.115a1.725 1.725 0 0 1 1.01 2.526l-.2.35c-.7 1.22.78 2.7 2 2l.35-.2a1.725 1.725 0 0 1 2.526 1.01l.115.39c.41 1.4 2.4 1.4 2.81 0l.115-.39a1.725 1.725 0 0 1 2.526-1.01l.35.2c1.22.7 2.7-.78 2-2l-.2-.35a1.725 1.725 0 0 1 1.01-2.526l.39-.115c1.4-.41 1.4-2.4 0-2.81l-.39-.115a1.725 1.725 0 0 1-1.01-2.526l.2-.35c.7-1.22-.78-2.7-2-2l-.35.2a1.725 1.725 0 0 1-2.526-1.01l-.115-.39zM8 10.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/>
              </svg>
            </button>
            <button id="saveBtn" class="btn-tab-action" title="حفظ (Ctrl+S)" disabled>
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v7.293l2.646-2.647a.5.5 0 0 1 .708.708l-3.5 3.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L7.5 9.293V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1H2z"/>
              </svg>
            </button>
            <button id="closeAllTabsBtn" class="btn-tab-action" title="إغلاق كل التبويبات" disabled>
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M2.5 3a.5.5 0 0 0 0 1h7a.5.5 0 0 0 0-1h-7zM2 6.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5zM2.5 9a.5.5 0 0 0 0 1h7a.5.5 0 0 0 0-1h-7zM11.854 6.354a.5.5 0 0 0-.708-.708L10 6.793 8.854 5.646a.5.5 0 1 0-.708.708L9.293 7.5 8.146 8.646a.5.5 0 0 0 .708.708L10 8.207l1.146 1.147a.5.5 0 0 0 .708-.708L10.707 7.5l1.147-1.146z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="editor-body">
          <div id="welcome" class="welcome-view">
            <div class="welcome-content">
              <img id="welcomeLogo" class="welcome-logo" src="logo-dark.png" data-dark-src="logo-dark.png" data-light-src="logo.png" alt="Ḍād logo">
              <div class="welcome-grid">
                <div class="welcome-section welcome-start">
                  <div class="welcome-section-title">ابدأ</div>
                  <button id="welcomeOpenFolderBtn" class="btn-primary">فتح مشروع...</button>
                  <button id="welcomeSettingsBtn" class="btn-secondary">الإعدادات</button>
                </div>
                <div class="welcome-section welcome-recents-section">
                  <div class="welcome-section-title">مشاريع أخيرة</div>
                  <div id="welcomeRecents" class="welcome-recents"></div>
                </div>
                <div class="welcome-section welcome-shortcuts">
                  <div class="welcome-section-title">اختصارات</div>
                  <div class="shortcut-list">
                    <div class="shortcut-item"><span>الإعدادات</span><span class="key-group"><span class="key-badge">Ctrl</span><span class="key-sep">+</span><span class="key-badge">P</span></span></div>
                    <div class="shortcut-item"><span>إظهار المستكشف</span><span class="key-group"><span class="key-badge">Ctrl</span><span class="key-sep">+</span><span class="key-badge">B</span></span></div>
                    <div class="shortcut-item"><span>نافذة الإخراج</span><span class="key-group"><span class="key-badge">Ctrl</span><span class="key-sep">+</span><span class="key-badge">`</span></span></div>
                    <div class="shortcut-item"><span>حفظ</span><span class="key-group"><span class="key-badge">Ctrl</span><span class="key-sep">+</span><span class="key-badge">S</span></span></div>
                    <div class="shortcut-item"><span>تشغيل</span><span class="key-group"><span class="key-badge">F5</span></span></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="editor" class="editor-pane"></div>
          <div id="settingsPane" class="settings-pane view-hidden">
            <div class="settings-container">
              <div class="settings-title">الإعدادات</div>
              <div class="settings-description">إعدادات عامة للمشروع والمظهر.</div>

              <div class="settings-group">
                <label class="settings-label" for="projectPathInput">المسار الافتراضي لإنشاء المشاريع</label>
                <div class="settings-row">
                  <input id="projectPathInput" class="settings-input" type="text" readonly>
                  <button id="projectPathBtn" class="btn-secondary" type="button">اختيار...</button>
                </div>
              </div>

              <div class="settings-group">
                <label class="settings-label" for="themeSelect">المظهر (CodeMirror + IDE)</label>
                <select id="themeSelect" class="settings-select"></select>
              </div>

              <div class="settings-actions">
                <button id="saveSettingsBtn" class="btn-primary" type="button">حفظ الإعدادات</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Terminal Panel -->
    <div id="terminalPanel" class="terminal-panel hidden">
      <div class="terminal-header">
        <span>نافذة الإخراج</span>
        <button id="closeTerminalBtn" class="btn-close">×</button>
      </div>
      <div id="terminalOutput" class="terminal-output"></div>
      <div class="terminal-input-row">
        <input id="terminalInput" class="terminal-input" placeholder="أدخل نصًا للإرسال إلى stdin...">
        <button id="sendStdinBtn" class="btn-terminal">إرسال</button>
      </div>
    </div>

    <!-- Project Name Modal -->
    <div id="projectNameModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>إنشاء مشروع جديد</h2>
        </div>
        <div class="modal-body">
          <label for="projectNameInput">اسم المشروع:</label>
          <input id="projectNameInput" type="text" class="modal-input" placeholder="أدخل اسم المشروع...">
        </div>
        <div class="modal-footer">
          <button id="projectNameCancel" class="btn-secondary">إلغاء</button>
          <button id="projectNameSubmit" class="btn-primary">إنشاء</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
